<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Toast Notifications</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .demo-container {
            text-align: center;
            color: white;
        }

        .demo-container h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .demo-button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .demo-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        .toast {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
            min-width: 300px;
            max-width: 400px;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 8px 16px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(120%);
            opacity: 0;
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            position: relative;
            overflow: hidden;
            pointer-events: auto;
        }

        .toast.hiding {
            animation: slideOut 0.3s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards;
        }

        .toast-content {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 2;
        }

        .toast-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .toast-message {
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.4;
            flex: 1;
        }

        .toast-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 4px;
            border-radius: 50%;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .toast-close:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 0 0 16px 16px;
            animation: progress 4s linear forwards;
            z-index: 1;
        }

        .toast.error .progress-bar {
            background: linear-gradient(90deg, #ef4444, #dc2626);
        }

        .toast.warning .progress-bar {
            background: linear-gradient(90deg, #f59e0b, #d97706);
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        @keyframes progress {
            from {
                width: 100%;
            }
            to {
                width: 0%;
            }
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .toast-container {
                left: 20px;
                right: 20px;
                bottom: 20px;
            }

            .toast {
                min-width: unset;
                max-width: unset;
                width: 100%;
            }

            .demo-container h1 {
                font-size: 2rem;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
            }

            .demo-button {
                width: 200px;
            }
        }

        @media (max-width: 480px) {
            .toast-container {
                left: 16px;
                right: 16px;
                bottom: 16px;
            }

            .toast {
                padding: 14px 16px;
            }

            .toast-message {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1>Modern Toast Notifications</h1>
        <div class="button-group">
            <button class="demo-button" onclick="showToast('✅ File uploaded successfully!', 'success')">
                Success Toast
            </button>
            <button class="demo-button" onclick="showToast('🎉 Image converted!', 'success')">
                Celebration Toast
            </button>
            <button class="demo-button" onclick="showToast('⚠️ Error occurred!', 'error')">
                Error Toast
            </button>
            <button class="demo-button" onclick="showToast('📝 Changes saved automatically', 'success')">
                Auto-save Toast
            </button>
            <button class="demo-button" onclick="showToast('🔄 Processing your request...', 'warning')">
                Processing Toast
            </button>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let toastId = 0;
        const activeToasts = new Map();

        function showToast(message, type = 'success') {
            const id = ++toastId;
            const toast = createToastElement(message, type, id);
            
            const container = document.getElementById('toastContainer');
            container.appendChild(toast);

            // Set up auto-dismiss timer
            const timer = setTimeout(() => {
                hideToast(id);
            }, 4000);

            activeToasts.set(id, { element: toast, timer });

            // Trigger reflow to ensure animation works
            toast.offsetHeight;
        }

        function createToastElement(message, type, id) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-content">
                    <div class="toast-message">${message}</div>
                    <button class="toast-close" onclick="hideToast(${id})" aria-label="Close notification">×</button>
                </div>
                <div class="progress-bar"></div>
            `;
            return toast;
        }

        function hideToast(id) {
            const toastData = activeToasts.get(id);
            if (!toastData) return;

            const { element, timer } = toastData;
            
            // Clear the timer
            clearTimeout(timer);
            
            // Add hiding class and remove after animation
            element.classList.add('hiding');
            
            setTimeout(() => {
                if (element.parentNode) {
                    element.parentNode.removeChild(element);
                }
                activeToasts.delete(id);
            }, 300);
        }

        // Demo: Show a welcome toast on load
        setTimeout(() => {
            showToast('🚀 Welcome! Click buttons to see toast notifications', 'success');
        }, 500);
    </script>
</body>
</html>
