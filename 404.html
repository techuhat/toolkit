<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page Not Found | ImagePDF Toolkit</title>

<link rel="stylesheet" href="public/styles.min.css?v=20250817">

<style>body{display:flex;min-height:100vh;align-items:center;justify-content:center;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:#0f1419;color:#fff;margin:0;padding:2rem} .card{max-width:520px;background:rgba(255,255,255,.05);padding:2.5rem 2rem;border-radius:24px;backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.12);box-shadow:0 10px 40px -10px rgba(0,0,0,.6)} h1{font-size:2.25rem;margin:0 0 .75rem;font-weight:700;background:linear-gradient(90deg,#6366f1,#8b5cf6);-webkit-background-clip:text;color:transparent} p{line-height:1.55;font-size:1rem;margin:.5rem 0 1.25rem} a.btn{display:inline-flex;align-items:center;gap:.5rem;background:#6366f1;color:#fff;text-decoration:none;font-weight:600;padding:.85rem 1.3rem;border-radius:14px;transition:.25s box-shadow,.25s transform} a.btn:hover{box-shadow:0 8px 25px -6px rgba(99,102,241,.55);transform:translateY(-3px)} .code{font-family:monospace;background:rgba(255,255,255,.08);padding:.35rem .6rem;border-radius:8px;font-size:.85rem;letter-spacing:.5px} footer{margin-top:1.75rem;font-size:.75rem;opacity:.55}
@media (max-width:600px){body{padding:1rem} .card{padding:2rem 1.5rem} h1{font-size:1.9rem}}
</style>
</head>
<body>
  <div class="card" role="alert" aria-live="assertive">
    <span class="code">404</span>
    <h1>Page Not Found</h1>
    <p>The page you’re looking for doesn’t exist or was moved. Try returning to the homepage or explore the toolkit’s image & PDF tools.</p>
    <p>
      <a class="btn" href="/">Return Home</a>
      <a class="btn" href="/index.html#tools">View Tools</a>
    </p>
    <footer>&copy; <span id="y"></span> ImagePDF Toolkit. All rights reserved.</footer>
  </div>
<script>document.getElementById('y').textContent=new Date().getFullYear();</script>
</body>
</html>
